name: Deploy ExoSoft Saúde → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # disparo manual

permissions:
  contents: read
  pages:    write
  id-token: write

# Evitar deploys concorrentes (cancela em andamento, aguarda novo)
concurrency:
  group:              "pages"
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # JOB 1 — Build Angular
  # ----------------------------------------------------------------
  build:
    name: Build Angular App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Injetar variáveis de ambiente nos arquivos de environment
      # (Configurar Secrets no repositório GitHub → Settings → Secrets)
      - name: Inject environment variables
        run: |
          sed -i "s|https://SEU_PROJECT_ID.supabase.co|${{ secrets.SUPABASE_URL }}|g" \
            src/environments/environment.prod.ts
          sed -i "s|SUA_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            src/environments/environment.prod.ts
          sed -i "s|SUA_GOOGLE_MAPS_API_KEY|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" \
            src/environments/environment.prod.ts

      - name: Build (production)
        run: npm run build:gh

      # GitHub Pages com custom domain requer CNAME na raiz do dist
      - name: Create CNAME for custom domain
        run: echo "exosoft.com.br" > dist/exosoft-saude/browser/CNAME

      # SPA fallback: duplicar index.html como 404.html
      # (GitHub Pages retorna 404 em rotas diretas; isso força o redirect)
      - name: Create 404.html SPA fallback
        run: cp dist/exosoft-saude/browser/index.html dist/exosoft-saude/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/exosoft-saude/browser

  # ----------------------------------------------------------------
  # JOB 2 — Deploy para GitHub Pages
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ----------------------------------------------------------------
  # JOB 3 — Sync MySQL → Supabase (opcional, executa depois do deploy)
  # ----------------------------------------------------------------
  sync-prices:
    name: Sync MySQL Prices
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bridge/package.json

      - name: Install bridge dependencies
        working-directory: bridge
        run: npm ci

      - name: Run incremental sync
        working-directory: bridge
        env:
          MYSQL_HOST:              ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT:              ${{ secrets.MYSQL_PORT }}
          MYSQL_USER:              ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:          ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE:          ${{ secrets.MYSQL_DATABASE }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node mysql-to-supabase.js
